name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Quick checks (no privileges) ──────────────────────────────────────────
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-features
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- --deny warnings
      # Feature-combination matrix beyond --all-features: catch broken gating
      # and feature-specific lints (e.g. an unused `mut` only on a path that a
      # different feature activates). clippy -D warnings, not just check.
      - name: clippy (feature combos)
        run: |
          for f in \
            "--no-default-features" \
            "--features flow" \
            "--features af-xdp" \
            "--features monitor-lite" \
            "--features arp" \
            "--features ndp" \
            "--features ad-protocols" \
            "--features asset-protocols" \
            "--features ssh" \
            "--features lldp,cdp" \
            "--features asset,lldp" \
            "--features quic" \
            "--features tokio,flow,dns,http"; do
            echo "::group::clippy -p netring $f"
            cargo clippy -p netring $f -- -D warnings
            echo "::endgroup::"
          done

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Unit tests (no privileges) ────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.95"]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests (workspace)
        run: cargo test --workspace --features tokio,channel

  # ── Monitor lib tests (flow surface, NO privileges) ───────────────────────
  # The Monitor / telemetry / layer / protocol modules are gated on `flow`,
  # which the unit-test and integration jobs don't enable — so without this
  # job the ~300 pure Monitor lib tests never run in CI. They open no sockets
  # (live capture lives in the `integration-tests`-gated root suite), so they
  # need no CAP_NET_RAW: run them here, fast and cap-free.
  test-monitor-lib:
    name: Monitor lib tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Monitor lib tests (flow surface)
        run: cargo test -p netring --features "tokio,channel,flow,parse,http,dns,tls,ja4plus,icmp,arp,ndp,lldp,cdp,asset,ad-protocols,asset-protocols,ssh,quic" --lib
      # 0.25: the flow-gated *integration* tests that validate the new surface
      # but open NO live socket (pcap replay / build-time filter checks /
      # compile-time Send assertions) — these were never run in CI before. They
      # exercise the B1 effect end-to-end path, all three subscription tiers,
      # the S2 kernel-prefilter union, and the `Send` run-loop assertion
      # (incl. the effect path). Cap-free, so they run here, not in the root job.
      - name: Monitor integration tests (cap-free)
        run: |
          cargo test -p netring --features "tokio,channel,flow,parse,pcap,http,dns,tls,ja4plus,arp,ndp,lldp,cdp,asset,ad-protocols,asset-protocols,ssh,quic" \
            --test monitor_replay --test monitor_kernel_prefilter --test monitor_send \
            --test monitor_run_until_idle --test monitor_drain_timeout --test monitor_name_in_ctx \
            --test arp_replay --test ndp_replay --test lldp_replay --test cdp_replay --test asset_inventory --test asset_inventory_udp --test asset_inventory_mdns --test monitor_reassembler_config \
            --test ad_protocols --test asset_protocols --test ssh_protocol --test quic_protocol --test ioc_match

  # ── Integration tests (need CAP_NET_RAW) ──────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build test binaries
        run: cargo test -p netring --features "integration-tests,tokio,channel,af-xdp" --no-run

      - name: Grant CAP_NET_RAW to test binaries
        run: |
          for bin in $(cargo test -p netring --features "integration-tests,tokio,channel,af-xdp" \
              --no-run --message-format=json 2>/dev/null \
              | jq -r 'select(.executable != null) | .executable'); do
            if [ -f "$bin" ]; then
              sudo setcap cap_net_raw,cap_net_admin+ep "$bin"
              echo "setcap: $(basename "$bin")"
            fi
          done

      - name: Run integration tests
        run: cargo test -p netring --features "integration-tests,tokio,channel,af-xdp" -- --test-threads=1

  # ── AF_XDP-on-lo live test (root) ─────────────────────────────────────────
  # The first live AF_XDP validation: loads the built-in redirect-all XDP
  # program on `lo` in SKB/generic mode and asserts the AF_XDP socket captures
  # redirected loopback traffic. Proven green on hosted runners (kernel 6.17,
  # ubuntu-24.04). Runs the test binary as ROOT (XDP load + BPF maps + XSKMAP).
  # Promoted from a 0.25 A3c spike — it found + fixed two real xdp-loader bugs
  # (BTF-less vendored object; XDP_FLAGS_REPLACE rejected by the link API).
  xdp-smoke:
    name: AF_XDP lo live (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Kernel / capability info
        run: |
          uname -a
          echo "kernel.unprivileged_bpf_disabled=$(cat /proc/sys/kernel/unprivileged_bpf_disabled 2>/dev/null || echo '?')"
          ip link show lo

      - name: Build the AF_XDP smoke test
        # flow,tokio,monitor enable the W1a in-Monitor loader test
        # (monitor_xdp_interface_loaded_captures_loopback_flows) alongside the
        # bare-socket smoke test.
        run: cargo test -p netring --features "integration-tests,af-xdp,xdp-loader,flow,tokio,monitor" --test xdp_lo_smoke --no-run

      - name: Run as root
        run: |
          bin=$(cargo test -p netring --features "integration-tests,af-xdp,xdp-loader,flow,tokio,monitor" \
              --test xdp_lo_smoke --no-run --message-format=json 2>/dev/null \
              | jq -r 'select(.executable != null and (.target.kind[] == "test")) | .executable' \
              | head -n1)
          echo "test binary: $bin"
          test -n "$bin" && test -f "$bin" || { echo "no test binary"; exit 1; }
          sudo "$bin" --nocapture --test-threads=1

  # ── Monitor live capture on lo (root) ─────────────────────────────────────
  # The flow-gated Monitor live tests need `flow` (the main integration job
  # doesn't enable it, so they were dormant). This runs the CI-robust one:
  # `monitor_lo_kernel_pushdown` generates its own loopback traffic, gracefully
  # skips without CAP_NET_RAW, and doesn't assume a perfectly quiet `lo`. It's
  # the live validation of the 0.25 packet tier + S2 kernel prefilter
  # (previously only pcap-replay + BpfFilter::matches software-tested).
  # (The brittle multi_capture/fanout-stats suite stays local-only for now.)
  monitor-live:
    name: Monitor live (lo, root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build the live monitor test
        run: cargo test -p netring --features "integration-tests,tokio,channel,flow,parse" --test monitor_lo_kernel_pushdown --no-run

      - name: Run as root
        run: |
          bin=$(cargo test -p netring --features "integration-tests,tokio,channel,flow,parse" \
              --test monitor_lo_kernel_pushdown --no-run --message-format=json 2>/dev/null \
              | jq -r 'select(.executable != null and (.target.kind[] == "test")) | .executable' \
              | head -n1)
          echo "test binary: $bin"
          test -n "$bin" && test -f "$bin" || { echo "no test binary"; exit 1; }
          sudo "$bin" --nocapture --test-threads=1

      # 0.25 W3: TX timestamping round-trip on lo (software SO_TIMESTAMPING).
      - name: TX-timestamp lo test (root)
        run: |
          cargo test -p netring --features "integration-tests,tokio" --test tx_timestamp_lo --no-run
          bin=$(cargo test -p netring --features "integration-tests,tokio" \
              --test tx_timestamp_lo --no-run --message-format=json 2>/dev/null \
              | jq -r 'select(.executable != null and (.target.kind[] == "test")) | .executable' \
              | head -n1)
          test -n "$bin" && test -f "$bin" || { echo "no test binary"; exit 1; }
          sudo "$bin" --nocapture --test-threads=1

  # ── Benchmarks compile ────────────────────────────────────────────────────
  bench:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench -p netring --no-run
      # 0.25 C3: the dispatch-throughput pps proxy needs `flow`; build + run it
      # briefly so a userspace-hot-path regression (or a build break) is caught.
      # See docs/PERFORMANCE.md.
      - name: Dispatch-throughput bench (smoke)
        run: cargo bench -p netring --features flow --bench dispatch_throughput -- --warm-up-time 1 --measurement-time 2

  # ── Zero-alloc regression bench (dhat) ────────────────────────────────────
  # Locks in netring 0.20's Δ 0 bytes / Δ 0 blocks steady-state
  # allocation contract over 100k synthetic Monitor dispatches.
  # On regression `dhat-heap.json` is uploaded for postmortem.
  zero-alloc:
    name: Zero-alloc bench (dhat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run zero-alloc regression bench
        run: cargo bench -p netring --features bench-zero-alloc --bench zero_alloc
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: dhat-heap
          path: dhat-heap.json

  # ── Examples compile ──────────────────────────────────────────────────────
  examples:
    name: Examples compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p netring --examples --features tokio,channel
      # Issue #12: the ARP example needs the `arp` + `emit` features.
      - run: cargo build -p netring --example monitor_arp_watch --features tokio,arp,emit
      - run: cargo build -p netring --example monitor_ndp_watch --features tokio,ndp,emit
      # Issue #29: the lateral-movement example needs the AD protocols + emit.
      - run: cargo build -p netring --example monitor_lateral_movement --features tokio,ad-protocols,emit
      # Issue #28: the asset-discovery example needs the asset protocols + emit.
      - run: cargo build -p netring --example monitor_asset_discovery --features tokio,asset-protocols,emit
      # Issue #30: the SSH/HASSH example needs the ssh + emit features.
      - run: cargo build -p netring --example monitor_ssh_hassh --features tokio,ssh,emit
      # Issue #14: the QUIC SNI example needs quic + emit.
      - run: cargo build -p netring --example monitor_quic_sni --features tokio,quic,emit
      # Issue #48: the IOC example needs dns/tls/http for all match arms.
      - run: cargo build -p netring --example monitor_ioc --features tokio,dns,tls,http
      # Issue #28: the L2-discovery example needs lldp + cdp + emit.
      - run: cargo build -p netring --example monitor_l2_discovery --features tokio,lldp,cdp,emit
      # Issue #28: the asset-inventory example needs asset + the discovery sources.
      - run: cargo build -p netring --example monitor_asset_inventory --features tokio,asset,arp,ndp,lldp,cdp,dhcp,ssdp,netbios-ns,mdns

  # ── License + advisory checks (cargo-deny) ───────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  # ── Unused dependency detection (cargo-machete) ──────────────────────────
  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bnjbvr/cargo-machete@main

  # ── miri: UB / provenance checking of the unsafe-heavy logic ───────────────
  # Scoped to the pure-logic surface (no syscalls/mmap): the in-tree cBPF
  # compiler + interpreter (`config::`) and the zero-copy `BatchIter`/`Packet`
  # pointer walk (`packet::`). Tree Borrows is the aliasing model we validate
  # against — the `BatchIter` raw-pointer iteration is sound under TB but trips
  # the stricter (legacy) Stacked Borrows; see docs/MIRI.md.
  miri:
    name: miri (Tree Borrows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: miri test (pure-logic surface)
        env:
          MIRIFLAGS: "-Zmiri-tree-borrows"
        run: |
          cargo +nightly miri test -p netring --lib config::
          cargo +nightly miri test -p netring --lib packet:: -- --skip afpacket
          # 0.25: the type-erased `*const ()` casts that make the dispatcher /
          # effect / packet-tier dispatch sound (registry.rs + dispatcher.rs)
          # live in `monitor::`/`subscription::` — miri them under Tree Borrows.
          # (These modules need `flow`; their tests are sync, so no tokio rt.)
          cargo +nightly miri test -p netring --features "tokio,flow,http,dns,tls" --lib monitor::dispatcher
          cargo +nightly miri test -p netring --features "tokio,flow,http,dns,tls" --lib monitor::registry
          cargo +nightly miri test -p netring --features "tokio,flow,http,dns,tls" --lib monitor::subscription

  # ── cargo-fuzz smoke: BPF compiler + interpreter against adversarial input ─
  fuzz:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz smoke (60s each)
        working-directory: netring
        run: |
          cargo +nightly fuzz run bpf_matches -- -runs=200000 -max_total_time=60
          cargo +nightly fuzz run bpf_builder -- -runs=200000 -max_total_time=60
          cargo +nightly fuzz run expr_parse -- -runs=200000 -max_total_time=60

  # ── netring-exporters companion crate (OTLP + Kafka) ──────────────────────
  exporters:
    name: netring-exporters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The `kafka` feature builds bundled librdkafka via cmake.
      - run: sudo apt-get update && sudo apt-get install -y cmake
      - name: OTLP (default) — clippy + test
        run: |
          cargo clippy -p netring-exporters --all-targets -- --deny warnings
          cargo test -p netring-exporters
      - name: Kafka feature — clippy + test
        run: |
          cargo clippy -p netring-exporters --no-default-features --features kafka --all-targets -- --deny warnings
          cargo test -p netring-exporters --no-default-features --features kafka
