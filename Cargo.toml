[package]
name = "netring"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "High-performance zero-copy packet I/O for Linux (AF_PACKET TPACKET_V3)"
keywords = ["packet", "capture", "af_packet", "tpacket", "zero-copy"]
categories = ["network-programming", "os::linux-apis"]

[dependencies]
libc = "0.2"
nix = { version = "0.31", features = ["socket", "mman", "poll", "net", "ioctl"] }
thiserror = "2"
log = "0.4"
bitflags = "2"

tokio = { version = "1", features = ["io-util", "net"], optional = true }
crossbeam-channel = { version = "0.5", optional = true }

[dev-dependencies]

[features]
default = []
tokio = ["dep:tokio"]
channel = ["dep:crossbeam-channel"]
nightly = []
integration-tests = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
