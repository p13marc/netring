[package]
name = "netring"
version = "0.12.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "High-performance zero-copy packet I/O for Linux (AF_PACKET TPACKET_V3 + AF_XDP)"
keywords = ["packet", "capture", "af_packet", "af_xdp", "zero-copy"]
categories = ["network-programming", "os::linux-apis"]
readme = "README.md"
documentation = "https://docs.rs/netring"
homepage = "https://github.com/p13marc/netring"
exclude = ["CLAUDE.md", "SPEC.md"]

[dependencies]
# Flow & session tracking lives in the flowscope crate.
#
# Non-optional: netring re-exports `flowscope::Timestamp` and
# `flowscope::PacketView` unconditionally as the canonical packet
# timestamp / view types. With `default-features = false`, flowscope
# pulls only `bitflags` + `thiserror` — both already in netring's tree.
# The `parse` feature additionally enables `flowscope/extractors`,
# `flow` enables `tracker`/`reassembler`/`session`.
flowscope = { version = "0.3", default-features = false }

libc = { workspace = true }
nix = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
bitflags = { workspace = true }

tokio = { workspace = true, optional = true }
tokio-stream = { version = "0.1", optional = true, features = ["sync"] }
futures-core = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
ahash = { workspace = true, optional = true }
xxhash-rust = { workspace = true }
crossbeam-channel = { workspace = true, optional = true }
etherparse = { workspace = true, optional = true }
pcap-file = { workspace = true, optional = true }
metrics = { workspace = true, optional = true }

# Optional XDP program loader (plan 12). Pure Rust; pulls aya for
# `bpf(2)` / netlink wrappers and XSKMAP map plumbing.
aya = { version = "0.13", optional = true }

[dev-dependencies]
env_logger = "0.11"
divan = "0.1"
criterion = { version = "0.5", features = ["html_reports"] }
etherparse = "0.16"
core_affinity = "0.8"
futures = "0.3"
proptest = "1"

[features]
default = []
tokio = ["dep:tokio", "dep:tokio-stream", "dep:futures-core"]
channel = ["dep:crossbeam-channel"]
parse = ["dep:etherparse", "flowscope/extractors"]
pcap = ["dep:pcap-file"]
metrics = ["dep:metrics"]
af-xdp = []
# Built-in XDP redirect-all program loader for AF_XDP. Pulls `aya`.
# Lets `XdpSocketBuilder::with_default_program()` create an XSKMAP,
# load the program, attach it to the interface, and register the
# socket — no external program loader required.
xdp-loader = ["af-xdp", "dep:aya"]
nightly = []
integration-tests = []
# Flow & session tracking. `flow + tokio` enables `AsyncCapture::flow_stream`.
# Pulls `bytes` since the async reassembler API uses it.
flow = ["parse", "flowscope/tracker", "flowscope/reassembler", "flowscope/session", "dep:bytes", "dep:ahash"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[[example]]
name = "xdp_send"
required-features = ["af-xdp"]

[[example]]
name = "pcap_write"
required-features = ["pcap"]

[[example]]
name = "async_xdp"
required-features = ["tokio", "af-xdp"]

[[example]]
name = "async_xdp_busy_poll"
required-features = ["tokio", "af-xdp"]

[[example]]
name = "async_xdp_self_loaded"
required-features = ["tokio", "af-xdp", "xdp-loader"]

[[example]]
name = "async_xdp_custom_program"
required-features = ["tokio", "af-xdp", "xdp-loader"]

[[example]]
name = "async_metrics"
required-features = ["tokio", "metrics"]

[[example]]
name = "async_flow_keys"
required-features = ["tokio", "parse"]

[[example]]
name = "async_flow_summary"
required-features = ["tokio", "flow"]

[[example]]
name = "async_flow_filter"
required-features = ["tokio", "flow"]

[[example]]
name = "async_flow_history"
required-features = ["tokio", "flow"]

[[example]]
name = "async_flow_channel"
required-features = ["tokio", "flow"]

[[example]]
name = "async_lo_dedup"
required-features = ["tokio"]

[[example]]
name = "async_flow_conversations"
required-features = ["tokio", "flow"]

[[example]]
name = "async_flow_idle_per_key"
required-features = ["tokio", "flow"]

[[bench]]
name = "throughput"
harness = false
